# This config tests the config_scanner's regexes and parsing
server {
    listen 443 ssl;
    # Mixed valid and garbage ciphers, extremely long strings
    ssl_ciphers "ECDHE-RSA-AES256-GCM-SHA384:GHOST-PROTOCOL-V1:AES128-SHA:NULL:MD5:🤡:SUPER-SECRET-CIPHER-THAT-DOES-NOT-EXIST:DHE-RSA-AES128-GCM-SHA256";
    
    # Missing newlines or weird formatting
    ssl_protocols TLSv1.2 TLSv1.3; ssl_prefer_server_ciphers on;
}

# SSH Config with invalid MACs
Host *
    Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,fake-cipher-123
    MACs hmac-sha2-512,hmac-md5,super-mac-9000
